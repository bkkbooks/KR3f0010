body:
  text: 提要表度説天文算法類一推步之屬臣等謹案表度説一卷明萬厯甲寅西洋人熊三拔撰三拔有泰西水法已著録是書大旨言表度起自土圭今更創為捷法可以隨意立表凡欲明表景之義者先須論日輪周行之理及日輪大于地球比例彼法别有全書此復舉其要略分為五體一謂日輪周天上向天頂下向地平其轉于地面俱平行故地體之景亦平行一謂地球在天之中若令地球不在天中則在地之景必不能隨日周轉且遲速不等矣今春秋二分日輪六時在地平上為晝六時在地平下為夜非在正中而何一謂地小于日輪從日輪視地球止于一點若令地非一點則隨在地面不得見天體之半必上半恆小下半恆大而為半地之厚所礙矣一謂地本圓體故一日十二辰更疊互見如正向日之處得午時其正背日之處得子時處其東三十度得未時處其西三十度得巳時若以地為方體則惟對日之下者其時正處左處右者必長短不均矣一謂表端為地心凡立表取景必于兩平面之上求得兩種景其一立表平面上與地平成直角其所得景直景也如山嶽樓臺樹木等景在地平者是也其一橫表之景倒景也如向日有墻于其平面橫立一表于地平為平者是也末言表式表度并節氣時刻推算之法繪畫日晷術皆具有圖説指證確實夫立表取影以知時刻節氣厯法中之至易至明者然非明於天地之運行習于三角之算術則不能得其確準是時地圓地小之説初入中土驟聞而駭之者甚衆故先舉其至易至明者以示其可信焉簡平儀説天文算法類一推步之屬臣等謹案簡平儀説一卷明西洋人熊三拔撰據卷首徐光啓序蓋常參證于利瑪竇者也大旨以視法取渾圓為平圓而以圓測量渾圓之數凡名數十二則用法十三則其法用上下兩盤天盤在下以取赤道經緯故有兩極線赤道線節氣線時刻線地盤在上以取地平經緯故有天頂有地平有髙度線有地平分度線皆設人目自渾體外逺視其正對大圓為平圓斜倚於內者為撱圓當圓心者為直線其與大圈平行之距等小圈亦皆為直線地盤空其平圓使可合視二盤中挾樞紐使可旋轉用時依其地北極髙度安定二盤則赤道地平兩經緯交錯分明凡節氣時刻髙度偏度皆可互取其數天盤用方板上設兩耳表以目測影地盤中心繫墜線以視度分立用之可以得太陽髙弧度既得太陽髙弧則本時諸數皆可取焉蓋是儀寫渾於平如取影於燭雖云借象而實數可推弧三角以量代算之法實本於此今復推于測量法簡而用捷亦可云數學之利器矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書表度説熊三拔口譯明周子愚撰表度説五題厯家有渾天儀有平儀有圭表有正方案以測七政星辰髙下之分以察日至之景以審日月方位因而隨時隨地可用測驗日輪髙下度分及午正初刻也有法於此任意立表取景以表景度分得日髙度分甚為簡便第欲明表景之義先須論日輪周行之理及日輪大于地球之比例二論為説甚長俱有全書今特舉要略作五題焉第一題日輪周天上向天頂下向地平其轉于地面俱平行故地體之景亦平行解曰周天三百六十度分為四圈分每分九十度所謂周天象限也試如上圖午酉子邜周天也午酉象限九十度也日輪自卯向午每刻行三度四十五分八刻為一時每時平行三十度至午得三時自午向酉亦如之故一周得十二時終古如此因知其終古平行也其所照物景周行地面亦平行也令日輪在甲照乙地球其景必至丙日在甲向午上行一度景在丙亦向子下行一度故景與日輪恆平行相等也第二題地球在天之中解曰令地球不在天中在其一隅如上圖丁為天中設地球在乙日輪在甲照乙地球其景必至丙則地之景必不能隨日輪而平行轉周蓋日行從甲過戊至丙景必從丙過己至甲是日輪行大半圈分而景行小半圈分遲速不等甚矣依第一題日輪與景不得不平行相等故不得言地球不在天中也又春秋二分日躔赤道晝夜平是因地在天中故日輪六時在地平上為晝六時在地平下為夜非在正中而何第三題地球小于日輪從日輪視地球止於一點此題全説見天地儀解今約略論説以明表景之理焉依第二題地在天中而分日天為兩平分欲分圈界為兩平分其徑線必過圈心如上甲乙丙線分圈于甲丙必過乙心而為兩平分令不過心而過心之上或下如丁戊己線過戊在圈心之上而兩分圈界于丁己則非兩平分也今地球分日天為兩平分隨人所至地面恆得見天體之半又春秋二分晝夜平故其大比日天當止一點令非一點而為大如戊庚即人在戊地面不得見天體之半其地平線平行至丁己亦不能分日天為兩平分也從日輪視地既小如一點今從地視日乃大如小車輪者日輪本大于地球一百六十倍故也此論見乾坤體義第四題地本圜體解曰凡物有本像焉地之本像圜體也世有云天圜地方動靜之義方圓之理耳今先論東西後論南北合證地圜之旨日月諸星雖每日出入地平一遍第天下國土非同時出入蓋東方先見西方後見漸東漸早漸西漸遲如有人居東又一人居西東西直相去試七千五百里則東人見日為午正初刻此際西人乃見日在禺中為己正初刻也周天三百六十度每度為地二百五十里若相去百八十度則東方之午為西方之子相去九十度則東方之午為西方之卯矣餘度俱依此推如上圖午酉子邜為日天甲乙丙丁為地球令日輪在午而人居甲即日正在其天頂得午時人居丙即得子時日在其天頂衝也東去甲九十度居丁得酉時日既過其天頂將沒于地則午甲丙子為其地平也西去九十度居乙即得邜時日向其天頂方出于地亦午甲丙子為其地平也依此推算令日輪出地平在邜人居丁得午時居乙得子時矣此何以故地為圜體故日出于邜因甲髙與乙障隔日光不照故丁之日中乙之半夜也若地為方體者如上甲乙丙丁則日出邜凡甲乙丁地面人宜俱得邜日入酉宜俱得酉不應東西相去二百五十里而差一度又七千五百里而差一時也故明有時差者不能不信地圜也又丁乙與甲異地即異天頂即異日中而又與甲同邜酉即丁之午前短午後長矣乙之午前長午後短矣獨甲得午前後平耳而今之半晝分天下皆同何也則明有半晝分者不能不信地圜也或問曰此理甚明矣然于言兩地相逺一得午一得子晝夜時刻天下各異何自驗之乎曰敝國諸儒多習厯象之學推驗大地經緯度數皆與天應以為推算七政測量地海之用其推驗緯度稍易大抵用午正日晷或星髙及南北二極取之其推驗經度稍難必于月食取之夫月食與日食異日或食或不食或食而分數多寡時刻先後隨地各異月之食限分數時刻天下皆同但入限有晝夜人有見不見耳今以之推顯地度每測得一處月食甚于子即他處在其東者必食甚于丑矣在其西者必食甚于亥矣可見此一方之子時乃東方之丑時西方之亥時也若兩地相去九十度則東方見食于子者西方見食于酉矣若相去百八十度則此方見食于子者彼方必于午不見食矣蓋月食有定而天下之見食各異又每去九百三十七里半而差一刻可見時刻天下各異各以日到本天頂為午正初刻也又月平行自西而東一日大約十三度強每一時約一度五分度之一其所離列宿次舍每時各異故西土厯家欲知兩地東西相去道里之數即兩地相約于同夜測月輪與某星同經度分為何時刻分如東方與此星同度分為子而西方與同度分為丑相隔一時即東西相去遠七千五百里也以此推之知天下時刻各因日輪所至不可疑也即地為圜體又何疑焉自南而北地為圜體亦可推也試如有人居廣東測北極出地得二十二度北行二百五十里見北極稍髙測得二十三度次每行二百五十里皆如之至京都測北極出地得四十度矣亦見北界星廣東不見者其在廣東亦見南界星京師所未見者此由地為圜球人乃循球而行故南北二極及附近諸星隨而漸次隱見也若地為平體隨人所至恆見天星髙于地平若干度矣如上圖西南東北為周天甲乙丙為地之圜球丁戊己為地之方面若人在圜球之乙即見在南諸星從乙漸向丙即南諸星漸隱矣漸向甲者反是若人在平面之丁即得俱見南北二極之星其在戊在巳亦如南非極諸星何由得漸次隱見乎則地為圜體亦可證也又地周三百六十度每度二百五十里其周圍實獨有九萬里令地為方四面其一面應得二萬二千五百里人居一面地平之上其二萬二千五百里之內並宜見之乃今目力所及極大略能見三百里即於最髙山上未有能見四五百里者則地之圜體突起于中能遮兩界故也不惟髙山即空際之雲亦然試令兩方相去四五百里其一密雲甚雨其一日色晴霽此密雲處不見日彼晴霽處不見雲矣人聞雷聲而不見密雲者恆有之蓋雷聲所極可至三百里以外故耳可得聞而雷起處必有密雲而三百里以外空際之雲人遂不能見之夫向所云平地不見四五百里猶云目力有限乃空際之雲物在三百里以外者遂不能見之則豈非地為圜體人所及見之面至於三百里而止乎以此地圜故若有二國東西相去四萬五千里得一百八十度半地之周居西二人約往東國一向西一向東令同時發行而以發行之第六日相遇於東國其同發時為月之朔日則向東者遇之日為月之六日向西者遇之日為月之五日此兩人行同至同所更厯時刻同而一為六日一為五日何也蓋東行者遡日而馳漸就於日故此人恆先得見日出地而日先得至其天頂西行者與日俱馳漸遠於日故此人恆後見日出地而日後至其天頂也今大西洋估舶至小西洋嵗嵗有之若二船同日解維其一東行其一西行後相遇於小西洋東行者若算得月之六日甲子即西行者必算得月之五日癸亥試如後圖甲乙二船俱從大西洋往小西洋同以三月初一日午時解維甲船望西行至申即申為其天頂乙船望東行至戍即戌為其天頂因日輪自東而西當先至戌後至申戌在申東即日輪第一周先至戌乙船以戌為天頂是得午時從昨開洋至此得一日足甲船以申為天頂日未至自戌至申須二時則乙船之午是甲船之辰扣至一日足實少二時次乙船至亥甲船必至未各以亥未為其天頂日輪第二周先至亥後至未自亥至未隔四時則東船先四時而得午正從開洋扣得二日足西船更須四時乃得午為二日足也次乙船至子甲船必至午而子午為其天頂日輪第三周先至子後至午東船在子先得午時為三日足自子至午隔六時西船在午須六時乃得午為三日足次至丑至己亦如之及東船至寅西船宜至辰日輪自寅繞東至辰隔十時故十時之初東船先得五日足而西船尚須十時乃適足故甲乙二船自開洋至此際一得五日一得四日零二時既抵小西洋而卯為其天頂日輪至邜即向東者實滿六日向西者實滿五日是故雖同發俱至而先後差一日也此何以故地為圜體人居東先得見日輪出地平居西後見故也五日六日假説之實行者不論一年二年皆差一日其理同也或問地果圜體則上下四旁皆生人所居不知在下者安所佇其足哉曰地球之説其理甚廣西庠有專書備論今獨舉一二端明徵此理其一曰天下萬物各有本所最上本所為天之上最下本所則為地之中心也其二曰物之體質有輕有重最輕妙者就最上所如火是也最重滯者就最下所如土是也其三曰物重者各有體之重心此重心者在重體之中試觀于衡均重則不欹物重之重心得在其中故也其四曰既地中之心為諸重物各重心之本所物之重心悉欲就之欲就之勢其下必為垂線也如人上山山之陡面不能正佇人足如佇地平與其直角造室立柱於山之陡面亦不能與為直角也何故乎人體之重心所欲就者為地之心下就之勢作一地之心而垂線欲垂線立柱亦然山之斜面與地中心非相對待如地平之面故人體柱體與其峻面悉不能為直角也如上圖甲山欲立柱作直角于山之陡面如乙必傾矣其體之重心所願就者為丁地心非甲山之心也雖陡面必與地平為直角如丙乃安何故其體之重心與丁相直耳故凡重物居地面之上各以地心為下以天為上因其重心願就地心遂得安于地面能佇其足矣因是可知上下之分凡謂下者逺于天而就地心也謂上者就天而逺于地心也是故地之圜球懸于空際居中無著常得安然蓋四方土物皆願降就于地心之本所東降欲就其心而遇西就者南降欲就其心而遇北就者悉悉如此相遇之際皆能相衝相逆故凝結于地之中心即不相及者以欲就故附離不脫得令大地懸居空際也如上圖丙為中心甲乙兩分各為地之半球甲東降就其心乙西降就其心其兩半球又各有本體之重心如丁如戊甲東降其本性必欲令本體之重心丁至于丙然後止而不可得何者乙西降亦欲其體之重心戊至丙中心然後止也故兩半球相遇于丙中心甲不令乙得西乙不令甲得東一衝一逆力勢均平遂兩不進亦兩不能退而懸居空際安然永奠矣試于一門二人出入其一在內其一在外在外者衝欲開之在內者逆欲閉之若同衝同逆為力均平門必不動甲乙半球其理同也推至四方八面一塵一土莫不皆然隤然下凝職由于此矣第五題表端為地心解曰地球之大比日天只止一點本篇三題解况地上山嶽樓臺樹木及所立之表何足算乎亦與大地共為一點而已故雖人所立表表景隨日輪若在地面苐以一點論之則表端之景與地心之景一也故表端不得不為地也欲徵其實試作一赤道晷其法於平面作圈圈界平分三百六十度每三度四十五分每一度變四分為一刻每三十度為一時立表于圈心候之即見表景平行每刻三度四十五分每八刻為一時每時三十度與日輪旋轉地心度數相等設非表端為地心安能日景平行且用此平行日景作日晷數十百種一一合轍乎既明表端為地心因可隨地隨時立表取景以得日行周天定度也凡立表取景必于兩平面之上求得兩種景其一立表平面上與地平為直角其所得景直景也如山嶽樓臺樹木等景在平地者是如上圖甲乙為表丙乙丁為地平面戊為日輪立甲乙表任意長短與丙乙丁地平面為直角令日輪在戊為表東其光必過甲表端表端景必在表西丁則乙丁為直景其一倒景者橫表之景也如向日有墻于其平面橫立一表與地平為平行者是如上圖甲乙為墻丙丁為表戊為日輪立丙丁表于甲乙墻之平面為橫表與地平平行令日輪在戊其光過表端表端景必在已而丁己為倒景立表取景以表之度分量此二種景可得其短長以短長之度數可得日軌離地平分秒又量得一種景推算可得别種但須先得二景之比例及表與二景相求之法乃悉其立法所由今引説數條推明指義如左其一曰日軌出地平從一度至九十度漸升上就天頂既過一象限從九十度漸入地平下離天頂故表景因日上下而得消長日上直景消倒景長日下倒景消直景長皆至午正而復其二曰直景與倒景之比例表與二景之比例皆在日輪出入上下度分也令立二表相等取兩種景日出地平則倒景表無景其端正對日光故也而直景之表有無窮景無數可量其景與地平平行故也如上二圖甲為表乙為日軌出地平于直景見甲表為無窮景與地平為平行線故不能交于地平其故見幾何原本卷之一次見倒景之表甲正對日軌出地平之乙故無景其三曰日軌既出地平漸向天頂而上至髙四十五度此半象分內二景一消一長直景漸消顧大于表倒景漸長顧小于表日過四十五度而上直景亦消而小于表倒景亦長而亦大于表試如上圖甲為日軌在四十五度以下到丙而丙戊大于戊己表其到丁而丁戊小于戊己表也若乙為日軌在乙四十五度以上其直景到丁而丁戊小于戊己表倒景到丙而丙戊大于戊己表矣又日向天頂而上非獨所立表之直景漸消而山嶽樓臺樹木之景亦然其四曰日軌髙四十五度為半象限即二景得相遇其長皆與表等如上甲為日軌髙四十五度即丙丁二景之表等因知二景與表皆等蓋日軌在甲表景必在乙即顯乙丙直景倒景皆與丙丁兩表等矣諸物之景亦然故測得日髙四十五度此際量得山嶽樓臺樹木之景度分即得物髙度分也其五曰日軌至天頂髙九十度缺即直景表無景而倒景之表有無窮景試如日軌在甲天頂乙直景之表端正對于甲日軌故無景乙表之倒景必與丙丁墻面平行故為無窮景此與第二論同義也蓋如直景因與地平為平行線故不能交於地平倒景乃與墻面亦為平行線却不能交於墻面也其六曰日出地與日髙九十度二景之理既同即一度至其間相反相對者理並同也試如日髙二度直景得長倒景得短日髙八十九度倒景得長直景得短則日髙二度之直景八十八度之倒景其長同也其短反是以至日髙三四五度二景短長與日髙八十七八十六八十五度並同也假如立二表相等各十二平分之日髙五度直景之長為表之一百三十七度即日髙八十五度倒景之長亦為表之一百三十七度日髙五度倒景之短為表之一度日髙八十五度直景之短亦為表之一度二景一消一長相反相對無有不合故用日髙度分表景短長立法布算得一推二至為簡便也表得分十二平分用日髙度分表景短長立算用日髙度分直景倒景短長立算右各圖皆以直景倒景長短立算而得日髙度分最上最下各橫書一行日髙之度也上行順算自一度至九十度用之因直景度分而得日髙之度下行逆算自九十度起算至一度用之因倒景度分而得日髙之度盡左盡右直書各一行日髙之分也右行從上起算自一分至六十分用之因直景而得日髙之分左行從下起算自一分至六十分用之因倒景而得日髙之分假如立竪表取直景若量其長得表之五十五度四十分欲知此時日軌髙幾何度分檢取圖中表景度分下五十五度四十分所在即直視本行最上得十二度橫視右行相對得一十分是為日軌髙一十二度一十缺分也若立橫表取倒景而得表之長五十五度四十分即下行日髙得七十七度左行相對得五十分是為日髙七十七度五十分也分表之法凡立表取景先定表長以表之長任意平分為若干度右圖表度十有二故今以十二為法分表為十二平分以十二平分之一為度每度更六十平分之共得七百二十分表長無定度愈長景則愈凖立表之法凡立表必作垂線於平面而與為直角表偏其端則下而景短立法若表長一尺法以內則以表之位為心從心作一圈任意大小次三平分圈界作三立表于圈心用規從界之一點量至表端為度用此度量第二三點皆至表端則表正矣一不至表端者改之若表長數尺至數丈者或四面八面各懸垂線正之如周禮八繩附臬之法試如上圖甲為表位以甲為心作丙丁戊三平分圈界作丙丁戊三點用規從丙界點量向表端得度用元度從丁從戊量至表端皆等則表正也用法第一隨地隨時測日軌髙幾何度分凡測候者欲定時成嵗也定嵗之最急者為隨地隨時測日軌髙度分以知二至之日時刻分西儒多習厯造器以測日髙其法甚衆立表是其一法特為簡便焉欲以直景測日髙依法立表承日取景視表景于平面所至依表之度分量其長既得景長為表之幾何度分檢上圖得所求假如立表取景以表之度分量景長得四十三度十六分檢上圖表景度分下四十三度十六分所在此為直景視上行日髙度得十五視右行日髙分得三十是日軌髙于地平一十五度三十缺分也缺倒景測驗亦如之但檢圖當視下行日髙度左行日髙分耳第二隨地隨時測午正初刻測本日日軌最髙度分及定方面正法日輪自出地平至午正時漸近子午線而上過午正漸近地平而下故日輪出地最髙之度為午正初刻欲得午正初刻測本日何時太陽至子午線上及日行所至最髙之度即是也依上法立表取景若直景者日軌漸上直景漸消日軌漸下直景漸長故表景甚消之時即日軌最髙之度視表景消極長初即得午正初刻立表取景測午正初刻先於午前數刻視表景之末點識之次用日晷或任意視景每過一刻或半刻許俱如前纍識之若纍短者法所謂景消為日升為午前也復依前法纍識之至表景得纍長法所謂景長為日降為午後也次檢表景識識中最短者得本日午正初刻依法量其長即得本日日軌最髙度分又自表位至景末作線即得本地子午線依子午作垂線得天元邜酉為定方面之正法第三隨地隨日測南北極出入地幾何度分南北極出入隨地不同厯家測驗先須得此不然即晝夜長短日月出入躔度髙下交食分數悉不可考悉不可論故元太史郭守敬分道測驗以為厯凖然周行四極輶軒錯出而所得止二十七處意其為術亦大艱難矣今用此法但是人迹所至都會郡邑一測便得不勞餘力矣依第二法立表測得本地午正初刻日軌髙幾何度分次求本日日躔距赤道幾何度分次視日躔赤道南北算之若日躔赤道南則以距度加髙度得赤道至地平之髙以赤道髙減周天象限度即得赤道離天頂度亦即本極出地度日躔赤道北則以距度減髙度如法算之亦得本極出地度分假如順天府於天正春分日依第二法立表測午正初刻測得日軌髙五十度又依距度得本日日躔黃赤道之交無距度即赤道髙于地平五十度減周天象限九十度得四十度即赤道離天頂度也南北極出入地其度分與赤道離天頂同故北極出地亦四十度又霜降日日躔赤道南是日午正初刻測得日軌髙三十八度三十分次依距度得十一度三十分以加日軌髙三十八度三十分亦得赤道髙于地平五十度如上法算得北極出地四十度又立夏日日躔赤道北是日午正初刻測得日軌髙六十六度四十分次依距度得十六度四十分以減日軌髙六十六度四十分亦得赤道髙五十度如上法算得北極出地四十度第四隨地測節氣定日二十四節氣者黃道二十四平分也日循黃道自西而東每日約行一度嵗行一周行至黃赤二道之交為天元春秋分離南離北去赤道各二十三度半強是二道相距甚逺之處為冬夏至厯家分黃道作四大限曰春秋冬夏日自春分東陸至夏至北陸為九十日有竒六平分為六節氣每節氣得十五日有竒曰春分清明穀雨立夏小滿芒種自夏至北陸至秋分西陸亦九十日有竒六平分為六節氣曰夏至小暑大暑立秋處暑白露自秋分西陸至冬至南陸亦如之為六節氣曰秋分寒露霜降立冬小雪大雪自冬至南陸至春分東陸亦如之為六節氣曰冬至小寒大寒立春雨水驚蟄共二十四節氣為黃道二十四平分故曰節氣者黃道平分也諸節氣距赤道南北逺近每相反相對者度分皆同故得六距度即得二十四距度第其髙下距地平不同故諸節氣各有測驗本法焉欲用此法又先用各距赤道幾何度分及本地北極度分故具列二圖如左假如順天府北極出地四十度欲知夏至髙于地平度分當以本日日距赤道二十三度半強求之凡北極出地度分與赤道離天頂度分等即順天府赤道南離天頂四十度又自地平至天頂恆為九十度今赤道離天頂南四十度其至地平必五十度即赤道髙于地平五十度而夏至日躔赤道北上二十三度半強以加五十度得七十三度半強為夏至日午正日髙于地平度分也日髙七十三度半強即表景長得表之三度三十三分故夏至前後各二三日每日立表取景視某日午正表景長得表之三度三十三分為夏至冬至日在南距赤道二十三度半強以減五十度為赤道髙于地平二十六度半弱即冬至日午正日軌髙于地平也依法得是日表景長得表之二十四度四分若冬至前後各二三日立表取景視某日午正表景長得表之二十四度四分為冬至春秋分為黃赤二道之交無距度正得赤道髙于地平五十度無加減日軌髙亦五十度表景長得表之十度四分春秋分前後各幾日立表取景視其日午正表景得表之十度四分為春秋分也凡黃道南北諸節氣相反相對者算法並同節氣在北即自春至秋分加其距度分于赤道髙度分得各節氣髙于地平度分節氣在南即自秋至春分減其距度分于赤道髙度分亦得各節氣髙于地平度分以其髙于地平度分依法測表景長短得各節氣本日每節氣本所及離赤道度分圖春分日軌出赤道南入赤道北當二道之交無距度分本地赤道髙于地平度分即日髙度分其宫為白羊之初無加減清明距赤道北六度十九分其宫為白羊之中加穀雨距赤道北十一度三十分其宫為金牛之初加立夏距赤道北十六度四十分其宫為金牛之中加小滿距赤道北二十度十二分其宫為雙昆之初加芒種距赤道北二十二度四十六分其宫為雙昆之中加夏至距赤道北二十三度半強其宫為巨蟹之初加小暑距赤道北二十二度四十六分其宫為巨蟹之中加大暑距赤道北二十度十二分其宫為獅子之初加立秋距赤道北十六度四十分其宫為獅子之中加處暑距赤道北十一度三十分其宫為室女之初加白露距赤道北六度十九分其宫為室女之中加秋分日軌出赤道北入赤道南當二道之交無距度分本地赤道髙于地平度分即日髙度分其宫為天稱之初無加減寒露距赤道南六度十九分其宫為天稱之中減霜降距赤道南十一度三十分其宫為天蝎之初減立冬距赤道南十六度四十分其宫為天蝎之中減小雪距赤道南二十度十二分其宫為人馬之初減大雪距赤道南二十二度四十六分其宫為人馬之中減冬至距赤道南二十三度半強其宫為磨羯之初減小寒距赤道南二十二度四十六分其宫為磨羯之中減大寒距赤道南二十度十二分其宫為寶瓶之初減立春距赤道南十六度四十分其宫為寶瓶之中減雨水距赤道南十一度三十分其宫為雙魚之初減驚蟄距赤道南六度十九分其宫為雙魚之中減北極出地度數及春秋分冬夏至表景度分北京四十強南京三十二半山東三十七山西三十八陜西三十六河南三十五浙江三十右北極出地度數止南北二京及江西廣東已嘗測驗無疑其餘據地圖約量之其確與否未能明也又北極出地每二百五十里差一度一省之中各郡邑各有本地度數故諸方測驗者須先定本地北極出地度分方能行測凡用右二圖當先知測驗法測驗之理略有數端其一曰自地平至天頂為九十度其二曰南北極不出入地者其赤道正為天頂若北極出地南極入地其度分與赤道南離天頂同也北極入地南極出地其度分亦與赤道北離天頂同也其三曰北極出地度分以減地平至天頂九十度即赤道髙于地平度分其四曰欲以表景測節氣本日先考節氣髙于地平度分其五曰節氣在赤道北為在赤道上而逺于地平欲得幾何度分當加其距赤道度分于赤道離地平度分節氣在赤道南為在赤道下而近于地平欲得幾何度分當減其距赤道度分于赤道離地平度分第五依表之度分物景之長得物之髙日軌在四十五度直景倒景皆與表等故物在地平之景與物之髙亦等在四十五度以下直景大于表則物之景必大于物之髙在四十五度以上直景小于表則物之景亦小于物之髙故量其景長即得其物髙試如依第一法測得日髙度分以表之景度分便得物在地平之景度分所據物景之度分及表度分推算便得物髙度分假如依第一法量得日髙四十五度此際量物景之長或山嶽之景或樓臺之景或樹木之景其景或長三丈據上法日髙四十五度物在地平之景與其物之髙等是物之髙亦三丈不可疑矣次若日髙三十度物景之長五丈據上法日在四十五度以下物景多于物之髙減其多必得其物之髙也次檢前圖日髙三十度之景係二十度四十七分內減表度十二餘八度四十七分為餘景今取五丈之景亦分作二十度四十七分截去餘髙八度四十七分而其餘即物之髙也若日髙五十度物景長二丈者據上法日在四十五度以上景短于物當用加法查前圖景得十度四分較表度十二不足一度五十六分即以二丈之景分作十度四分外補一度五十六分得物之髙餘倣此第六日晷日晷者定時之器也凡定時刻皆憑表景故造晷者先明表景之法日晷定時凡數百種其理甚廣别有成書今因表景及之止就用景而造者略説一二器耳先論其理略有數端其一曰表景與日躔平行日出地而上或過午時而下每行三度四十五分得一刻行三十度得一時表景亦然一長一消具有定度因其定度則可定時每日行三度四十五分而檢其表長定刻也每日行三十度而檢其表長則定時也午前則檢其直景之消倒景之長午後則檢其直景之長倒景之消也其二曰日愈髙直景愈短倒景愈長日之升于地平隨地各異表景之長在地面亦隨地各異也所以然者日之髙下於本地平隨南北極出入髙下也南北極之出入于本地平其髙下也亦隨地各異也其三曰赤道離天頂各與其極出地度分等如北極出地三十度赤道離天頂亦三十度而髙于地平六十度蓋地平于天頂恆為九十度故北極出地四十度赤道離天頂亦四十度而髙于地平五十度是故二分之日日躔赤道而測午正初刻若本地所得北極出地三十度測即日躔髙六十度本地所得北極出地四十度即日躔髙五十度是知午正初刻日髙于地平隨地各異也其四曰日躔赤道髙于地平既隨地各異即過此而躔赤道北或南其髙其下亦隨地各異也故夏至測午正初刻本地所得北極出地三十度即日髙八十三度半強若所得北極出地四十度即日髙七十三度半強也冬至亦然諸節氣亦然其五曰午正初刻之日軌髙既隨地隨節氣各異即諸時諸刻之日軌髙亦隨地各異也假如二分日日躔赤道或南或北測量己未二時其本處為北極出地三十度即日軌髙于地平六十二度若北極出地四十度即日軌髙五十九度諸時諸刻亦然是其表景亦隨日軌髙下而得長消故日軌髙下隨地隨節氣隨時刻各異表景長短亦隨地隨節氣隨時刻各異也故以表景測時刻當先得本地及本節氣每時每刻日軌髙幾何度分也其六曰既得每時每刻日軌髙度分即可用表景定時刻也假如順天府北極出地四十度夏至初日己未二時日軌髙于地平五十九度即直景長得表之七度十三分倒景長得表之十九度五十八分立表取直景候至景長七度十三分即己未時也若取倒景候至景長十九度五十八分亦己未時也其餘時刻推此類焉求各處各節氣每時每刻日軌髙度分具見簡平儀説今舉一二處為例如左造柱晷造圓柱晷法用堅木或銅作圜體如柱任意大小長短其圜必中規而上下等次于兩端之圈界各十三平分之依所分各界兩兩相對作直線俱平行各線與柱體亦平行柱體之周為十三直線皆平行相等每線直二節氣惟夏冬二至各得一線名為二十四節氣線即任取一線為冬至次右二曰小寒大雪右三曰大寒小雪右四曰立春立冬右五曰雨水霜降右六曰驚蟄寒露右七曰春分秋分右八曰清明白露右九曰穀雨處暑右十曰立夏立秋右十一曰小滿大暑右十二曰芒種小暑右十三曰夏至次作表表長短無定度約柱之長短而定其度既得其長依前分表法十二平分之為表度每度六十平分之凡十二度七百二十分若表體小者每度六平分之次依上圖視每節氣每時刻表景長短幾何度分而移之柱晷之節氣本線即得各時刻假如甲乙丙丁為圜柱其甲乙等附柱十三直線則二十四節氣線也戊己表度十二平分也若于夏至線欲定午正檢上圖夏至倒景于午正得表之四十度三十一分即規取戊己表之四十度三十一分於柱之夏至線上自乙向丙移量之得午正初刻也午初未初倒景得三十度二十八分亦如之諸時諸節氣俱如之安表之法晷之上端為樞表體之長信其度長為空於餘表而入之樞令表之度皆在晷體之外也表之末與樞之心為一直線用時以晷與表各展轉就日而測之用法視本日為某節氣第幾日轉表加于晷端界第幾日上次轉晷承日景令表景與節氣線平行視表末所至得時刻造方晷以倒景其法同也其節氣線以分黃道法為疏密度略見簡平儀説用直景造圜晷及方晷其法並同但表為立體晷體則橫安之表度説
